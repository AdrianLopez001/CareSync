server:
  port: 8081

spring:
  application:
    name: appointment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/caresync_appointments
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

logging:
  level:
    com.caresync: DEBUG
